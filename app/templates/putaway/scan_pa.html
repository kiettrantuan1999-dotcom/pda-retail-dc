{% extends "base.html" %}
{% block content %}

<div class="mb-3">
  <h4 class="fw-bold mb-0">📷 Quét PA/Pallet</h4>
  <div class="text-muted">Quét mã PA để tìm nhiệm vụ cất hàng</div>
</div>

<div class="card shadow-sm">
  <div class="card-body">

    <div class="mb-3">
      <label class="form-label fw-bold">Mã PA/Pallet</label>
      <div class="input-group">
        <input
          type="text"
          class="form-control form-control-lg"
          id="pallet_id"
          placeholder="Quét hoặc nhập mã PA"
          autocomplete="off"
        >
        <button type="button" class="btn btn-dark btn-lg" id="scanPalletBtn">
          📷
        </button>
      </div>
    </div>

    <button type="button" class="btn btn-primary btn-lg w-100" id="findPalletBtn">
      Tìm nhiệm vụ cất hàng
    </button>

  </div>
</div>

<div id="scannerBox" class="scanner-box card mb-3 mt-3 d-none">
  <div class="card-body">
    <div class="fw-bold mb-2">Đưa mã PA/Pallet vào khung camera</div>

    <video
      id="scannerVideo"
      style="width: 100%; border-radius: 8px; background: #000;"
      playsinline
      muted
    ></video>

    <button type="button" class="btn btn-danger w-100 mt-2" id="closeScannerBtn">
      Đóng camera
    </button>
  </div>
</div>

<div id="resultBox" class="alert mt-3 d-none"></div>

<div class="mt-3">
  <a href="/putaway" class="btn btn-secondary w-100">⬅ Danh sách cất hàng</a>
</div>

<div class="mt-2">
  <a href="/" class="btn btn-secondary w-100">⬅ Về trang chủ</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>
<script src="/static/js/scanner_zxing.js"></script>
<script src="/static/js/putaway_scan_pa.js"></script>

{% endblock %}
