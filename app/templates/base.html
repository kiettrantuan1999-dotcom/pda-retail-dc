<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Supra WES</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/pda.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">Supra WES</a>
    {% if user %}
    <span class="text-white small">{{ user.user_name }} | {{ user.role }}</span>
    <a class="btn btn-outline-light btn-sm" href="/logout">Đăng xuất</a>
    {% endif %}
  </div>
</nav>
<main class="container-fluid p-3">
  {% block content %}{% endblock %}
</main>
<div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3">
  <div id="appToast" class="toast text-bg-dark" role="alert">
    <div class="toast-body" id="toastBody"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
