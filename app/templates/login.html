<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111827">
  <title>Đăng nhập | Supra WES</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/pda.css" rel="stylesheet">
</head>
<body class="login-bg">
<div class="login-shell">
  <div class="login-card">
    <div class="text-center mb-4">
      <img src="/static/img/company_logo.svg" alt="Logo công ty" class="login-logo mb-3">
      <h1 class="login-title mb-1">Supra WMS</h1>
      <div class="login-subtitle"></div>
    </div>

    {% if error %}<div class="alert alert-danger border-0">{{ error }}</div>{% endif %}

    <form method="post" action="/login">
      <label class="form-label fw-bold">Tên đăng nhập</label>
      <input name="user_name" class="form-control form-control-lg scan-input" autofocus required autocomplete="username">

      <label class="form-label fw-bold mt-3">Mật khẩu</label>
      <input name="password" type="password" class="form-control form-control-lg scan-input" required autocomplete="current-password">

      <button class="btn btn-primary btn-lg w-100 mt-4 login-btn">Đăng nhập</button>
    </form>
  </div>
</div>
</body>
</html>
