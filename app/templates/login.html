<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập Supra WES</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/pda.css" rel="stylesheet">
</head>
<body class="login-bg">
<div class="container p-4">
  <div class="card p-4 mt-5">
    <h3 class="fw-bold mb-1">Supra WES</h3>
    <div class="text-muted mb-3">Hệ thống thực thi kho Retail DC</div>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <label class="form-label">Tên đăng nhập</label>
      <input name="user_name" class="form-control form-control-lg scan-input" autofocus required>
      <label class="form-label mt-3">Mật khẩu</label>
      <input name="password" type="password" class="form-control form-control-lg scan-input" required>
      <button class="btn btn-primary btn-lg w-100 mt-4">ĐĂNG NHẬP</button>
    </form>
  </div>
</div>
</body>
</html>
