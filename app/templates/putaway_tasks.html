{% extends "base.html" %}

{% block content %}

<div class="mb-3">
  <h4 class="fw-bold mb-1">📋 Put Away Task List</h4>
  <div class="text-muted small">Danh sách PA đang chờ Put Away</div>
</div>

<div class="card shadow-sm mb-3">
  <div class="card-body">

    <input
      id="searchInput"
      class="form-control form-control-lg mb-3"
      placeholder="🔍 Tìm PA / PO / SKU / Barcode"
      autocomplete="off"
    >

    <button
      id="refreshBtn"
      class="btn btn-outline-primary w-100">
      🔄 Làm mới
    </button>

  </div>
</div>

<div id="summaryBox" class="alert alert-info d-none"></div>

<div id="taskList"></div>

<div id="emptyBox" class="alert alert-secondary d-none">
  Không có task Put Away.
</div>

<div class="mt-3">
  <a href="/putaway" class="btn btn-outline-secondary w-100">
    ⬅ Quay lại Put Away
  </a>
</div>

{% endblock %}

{% block scripts %}
<script src="/static/js/putaway_tasks.js"></script>
{% endblock %}
