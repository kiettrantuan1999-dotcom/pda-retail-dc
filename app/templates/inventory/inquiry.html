{% extends "base.html" %}
{% block content %}

<div class="mb-3">
  <h4 class="fw-bold mb-0">🔎 Tra cứu tồn</h4>
  <div class="text-muted">Quét Barcode / SKU / Location để xem tồn hiện tại</div>
</div>

<div class="card shadow-sm mb-3">
  <div class="card-body">
    <label class="form-label fw-bold">Mã cần tra cứu</label>
    <div class="input-group mb-2">
      <input id="invQ" class="form-control form-control-lg" placeholder="Barcode / SKU / Location" autocomplete="off">
      <button class="btn btn-outline-primary" id="scanBtn" type="button">📷</button>
    </div>
    <button class="btn btn-primary w-100 pda-action-btn" id="searchBtn" type="button">TRA CỨU</button>
  </div>
</div>

<div id="invSummary" class="alert alert-info d-none"></div>
<div id="invResult"></div>

<div id="scannerBox" class="card mt-3 d-none">
  <div class="card-body">
    <div class="d-flex justify-content-between mb-2">
      <strong>📷 Camera</strong>
      <button class="btn btn-sm btn-danger" id="closeScannerBtn" type="button">Đóng</button>
    </div>
    <div id="reader"></div>
  </div>
</div>

<div class="mt-3">
  <a href="/inventory" class="btn btn-outline-secondary w-100">⬅ Quay lại</a>
</div>

{% endblock %}
{% block scripts %}
<script src="/static/js/inventory_inquiry.js"></script>
{% endblock %}
