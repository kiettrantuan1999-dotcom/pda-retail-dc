{% extends "base.html" %}
{% block content %}

<div class="mb-3">
  <h4 class="fw-bold mb-0">➕ Tạo đợt kiểm kê</h4>
  <div class="text-muted">Nhập danh sách location cần kiểm kê</div>
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post" class="card shadow-sm">
  <div class="card-body">
    <label class="form-label fw-bold">Tên đợt kiểm kê</label>
    <input name="count_name" class="form-control form-control-lg mb-3" placeholder="Ví dụ: Kiểm kê A01 ngày 28/06">

    <label class="form-label fw-bold">Danh sách vị trí</label>
    <textarea name="locations_text" class="form-control mb-2" rows="8" placeholder="A01-001&#10;A01-002&#10;A01-003" required></textarea>
    <div class="text-muted small mb-3">Có thể nhập mỗi dòng 1 vị trí hoặc ngăn cách bằng dấu phẩy.</div>

    <button class="btn btn-primary w-100 pda-action-btn" type="submit">TẠO TASK KIỂM KÊ</button>
  </div>
</form>

<div class="mt-3">
  <a href="/inventory/counts" class="btn btn-outline-secondary w-100">⬅ Quay lại</a>
</div>

{% endblock %}
