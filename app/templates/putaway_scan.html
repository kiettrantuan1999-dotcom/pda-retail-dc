{% extends "base.html" %}

{% block content %}

<div class="mb-3">
    <h4 class="fw-bold">
        📥 Put Away
    </h4>

    <div class="text-muted">
        Scan PA để bắt đầu Put Away
    </div>
</div>

<div class="card shadow-sm">

    <div class="card-body">

        <label class="form-label fw-bold">
            PA / Pallet
        </label>

        <div class="input-group mb-3">

            <input
                id="pallet_id"
                class="form-control form-control-lg"
                placeholder="Scan PA"
                autocomplete="off"
            >

            <button
                class="btn btn-outline-primary"
                id="scanPaBtn"
                type="button">

                📷

            </button>

        </div>

        <button
            class="btn btn-primary w-100 pda-action-btn"
            id="loadBtn"
            type="button">

            TẢI THÔNG TIN

        </button>

    </div>

</div>

<div
    id="taskBox"
    class="card shadow-sm mt-3 d-none">

    <div class="card-body">

        <h5 class="fw-bold mb-3">

            Thông tin Put Away

        </h5>

        <table class="table table-bordered">

            <tr>

                <th width="35%">PO</th>

                <td id="po_no"></td>

            </tr>

            <tr>

                <th>PA</th>

                <td id="pa"></td>

            </tr>

            <tr>

                <th>SKU</th>

                <td id="sku"></td>

            </tr>

            <tr>

                <th>Barcode</th>

                <td id="barcode"></td>

            </tr>

            <tr>

                <th>Số lượng còn Put Away</th>

                <td id="qty"></td>

            </tr>

        </table>

        <hr>

        <h5 class="fw-bold">

            📍 Vị trí gợi ý

        </h5>

        <div id="locationSuggest"></div>

        <hr>

        <div class="mb-2">

            <label class="form-label fw-bold">

                Scan vị trí

            </label>

            <div class="input-group">

                <input
                    id="location_id"
                    class="form-control form-control-lg"
                    placeholder="Scan Location"
                >

                <button
                    class="btn btn-outline-primary"
                    id="scanLocationBtn"
                    type="button">

                    📷

                </button>

            </div>

        </div>

        <div class="mb-3">

            <label class="form-label fw-bold">

                Số lượng Put Away

            </label>

            <input
                id="qty_putaway"
                type="number"
                class="form-control form-control-lg"
            >

        </div>

        <div
            id="locationStatus"
            class="alert d-none">

        </div>

        <button
            id="confirmBtn"
            class="btn btn-success w-100 pda-action-btn">

            XÁC NHẬN PUT AWAY

        </button>

    </div>

</div>

<div
    id="scannerBox"
    class="card mt-3 d-none">

    <div class="card-body">

        <div class="d-flex justify-content-between">

            <strong>

                📷 Camera

            </strong>

            <button
                class="btn btn-sm btn-danger"
                id="closeScannerBtn">

                Đóng

            </button>

        </div>

        <div id="reader"></div>

    </div>

</div>

<div class="mt-3">

    <a
        href="/putaway"
        class="btn btn-outline-secondary w-100">

        ⬅ Quay lại

    </a>

</div>

{% endblock %}

{% block scripts %}

<script src="/static/js/putaway_scan.js"></script>

{% endblock %}
